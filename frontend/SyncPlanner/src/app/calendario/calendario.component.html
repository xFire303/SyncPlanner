<div class="calendar-container">
  <div class="user">
    <h1>Benvenuto {{ username }}</h1>
  </div>
  <full-calendar [options]="calendarOptions"></full-calendar>
</div>

@if(showAddPrenotazione){
    <div class="overlay">
      <div class="modal-content">
        <app-add-prenotazione
          [data]="selectedDate"
          (close)="chiudiPrenotazione()"
        ></app-add-prenotazione>
      </div>
    </div>
}
